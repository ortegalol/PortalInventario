<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <title>Datos del Inventario</title>
        <meta charset="UTF-8"/>
        <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
        <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.css}"/>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/css/bootstrap.min.css" integrity="sha512-M2LPdH7Vq3XtTMCYV8oTbIwHtGReE1fKgYYc8WjxkkcN/86Rw/yPHb/99QdMG1XCBq0M7fD5o5u5jNzB32n3w==" crossorigin="anonymous" referrerpolicy="no-referrer" />

        <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
        <script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
        <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
        <style>
            body {
                background-image:
                    url('https://www.gob.mx/cms/uploads/identity/image/32471/cabecera_blanca.jpg');
                background-repeat: no-repeat;
                background-attachment: fixed;
                background-size: cover;
            }

            IMG.displayed {
                display: block;
                margin-left: auto;
                margin-right: auto
            }
            .display-flex {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            input[type="text"],
            input[type="email"],
            input[type="number"] {
                width: 100%;
                padding: 0px;
                margin-bottom: 2px;
                box-sizing: border-box;
            }
        </style>
    </head>
    <body>

        <header th:replace="layout/plantilla :: header"></header>        

        <div class="display-flex">
            <h2 class="text-center">Datos Inventario</h2>
            <a class="btn btn-dark" href="/">Regresar</a>
        </div>
        <br/>

        <form th:action="@{/import}" method="post" enctype="multipart/form-data">
            <input type="file"  th:name="file" />
            <input th:type="submit" class="btn btn-dark" value="Import" />
        </form>
        
        
        <form th:action="@{/guardar}" method="post" th:object="${inventario}">
            <br/>
            <div class="campo">
                <label for="nombre">Nombre:</label>
                <input type="text" name="nombre" th:field="*{nombre}"/>
            </div>
            <div class="campo">
                <label for="numEmpleado">Num Empleado:</label>
                <input type="number" name="numEmpleado" th:field="*{numEmpleado}"/>
            </div>
            <div class="campo">
                <label for="rfcEmpleado">Rfc Empleado:</label>
                <input type="text" name="rfcEmpleado" th:field="*{rfcEmpleado}"/>
            </div>
            <div class="campo">
                <label for="curpEmpleado">Curp Empleado:</label>
                <input type="text" name="curpEmpleado" th:field="*{curpEmpleado}"/>
            </div>
            <div class="campo">
                <label for="departamento">Departamento:</label>
                <input type="text" name="departamento" th:field="*{departamento}"/>
            </div>
            <div class="campo">
                <label for="puesto">Puesto:</label>
                <input type="text" name="puesto" th:field="*{puesto}"/>
            </div>
            <div class="campo">
                <label for="email">Email:</label>
                <input type="email" name="email" th:field="*{email}"/>
            </div>
            <div class="campo">
                <label for="marcaCpu">Marca CPU:</label>
                <input type="text" name="marcaCpu" th:field="*{marcaCpu}"/>
            </div>
            <div class="campo">
                <label for="modeloCpu">Modelo CPU:</label>
                <input type="text" name="modeloCpu" th:field="*{modeloCpu}"/>
            </div>
            <div class="campo">
                <label for="serieCpu">Serie CPU:</label>
                <input type="text" name="serieCpu" th:field="*{serieCpu}"/>
            </div>
            <div class="campo">
                <label for="marcaMonitor">Marca Monitor:</label>
                <input type="text" name="marcaMonitor" th:field="*{marcaMonitor}"/>
            </div>
            <div class="campo">
                <label for="modeloMonitor">Modelo Monitor:</label>
                <input type="text" name="modeloMonitor" th:field="*{modeloMonitor}"/>
            </div>
            <div class="campo">
                <label for="serieMonitor">Serie Monitor:</label>
                <input type="text" name="serieMonitor" th:field="*{serieMonitor}"/>
            </div>
            <br/>
            <input class="btn btn-dark" type="submit" name="guardar" value="Guardar"/>
        </form>
    </body>
</html>
